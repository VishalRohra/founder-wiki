<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Founder Wiki</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    background: #f6f6f6;
    color: #202122;
    line-height: 1.6;
    font-size: 14px;
  }

  a { color: #36c; text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Header */
  .site-header {
    background: #fff;
    border-bottom: 1px solid #a7d7f9;
    padding: 6px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .site-logo {
    font-size: 18px;
    font-weight: 700;
    color: #000;
    cursor: pointer;
    font-variant: small-caps;
    letter-spacing: 0.5px;
  }
  .site-logo span { color: #36c; }
  .site-tagline { font-size: 11px; color: #54595d; font-style: italic; }

  .search-bar { margin-left: auto; position: relative; }
  .search-bar input {
    padding: 5px 10px;
    border: 1px solid #a2a9b1;
    border-radius: 2px;
    font-size: 13px;
    width: 260px;
  }
  .search-bar input:focus { border-color: #36c; outline: none; }

  .search-results {
    position: absolute; top: 100%; left: 0; right: 0;
    background: #fff; border: 1px solid #a2a9b1; border-top: none;
    max-height: 300px; overflow-y: auto; z-index: 100; display: none;
  }
  .search-results.active { display: block; }
  .search-result-item { padding: 6px 10px; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
  .search-result-item:hover { background: #eaf3ff; }
  .search-result-item .sr-title { font-weight: 600; font-size: 13px; }
  .search-result-item .sr-aliases { font-size: 11px; color: #72777d; }

  /* Layout */
  .layout { display: flex; max-width: 1100px; margin: 0 auto; }

  /* Sidebar */
  .sidebar {
    width: 200px; min-width: 200px;
    background: #f8f9fa; border-right: 1px solid #eaecf0;
    min-height: calc(100vh - 40px); padding: 12px 0; font-size: 13px;
  }
  .sidebar h3 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
    color: #54595d; padding: 10px 14px 3px; margin-top: 4px; font-weight: 700;
  }
  .sidebar a {
    display: block; padding: 2px 14px; color: #36c; font-size: 13px; line-height: 1.8;
  }
  .sidebar a:hover { background: #eaf3ff; text-decoration: none; }
  .sidebar a.active { background: #eaf3ff; font-weight: 600; }
  .sidebar .nav-label { display: block; padding: 10px 14px 3px; font-size: 11px; color: #72777d; font-weight: 700; text-transform: uppercase; }

  /* Content */
  .content {
    flex: 1; background: #fff; padding: 20px 28px; min-height: calc(100vh - 40px);
  }

  .content h1 {
    font-size: 26px; font-weight: 400; border-bottom: 1px solid #a2a9b1;
    padding-bottom: 2px; margin-bottom: 12px; font-family: 'Linux Libertine', Georgia, serif;
  }
  .content h2 {
    font-size: 19px; font-weight: 400; border-bottom: 1px solid #eaecf0;
    padding-bottom: 2px; margin: 20px 0 8px; font-family: 'Linux Libertine', Georgia, serif;
  }
  .content h3 { font-size: 15px; font-weight: 600; margin: 14px 0 6px; }
  .content p { margin-bottom: 10px; }
  .content ul, .content ol { margin: 8px 0 12px 24px; }
  .content li { margin-bottom: 4px; }
  .content blockquote { border-left: 3px solid #c8ccd1; padding: 4px 12px; margin: 8px 0; color: #54595d; }
  .content strong { font-weight: 600; }

  /* Tables — Wikipedia style */
  .content table {
    border-collapse: collapse; margin: 12px 0; font-size: 13px; width: 100%;
  }
  .content th {
    background: #eaecf0; border: 1px solid #a2a9b1; padding: 6px 10px;
    text-align: left; font-weight: 600;
  }
  .content td {
    border: 1px solid #c8ccd1; padding: 6px 10px; vertical-align: top;
  }
  .content tr:nth-child(even) td { background: #f8f9fa; }

  /* Article meta line */
  .article-meta-line {
    font-size: 12px; color: #72777d; margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 1px solid #eaecf0;
  }
  .article-meta-line .meta-type {
    background: #eaecf0; color: #202122; padding: 1px 6px; border-radius: 2px;
    font-size: 11px; margin-right: 6px;
  }

  /* TOC — Wikipedia style */
  .toc-box {
    background: #f8f9fa; border: 1px solid #a2a9b1; padding: 10px 14px;
    margin: 0 0 16px 0; display: inline-block; min-width: 200px; max-width: 320px;
    font-size: 13px;
  }
  .toc-box .toc-title {
    font-weight: 700; font-size: 13px; text-align: center; margin-bottom: 6px;
  }
  .toc-box ol { margin: 0; padding-left: 20px; }
  .toc-box li { margin: 2px 0; }
  .toc-box a { color: #36c; }

  /* Backlinks section */
  .backlinks {
    background: #f8f9fa; border: 1px solid #eaecf0; padding: 10px 14px;
    margin-top: 20px; font-size: 13px;
  }
  .backlinks h3 { font-size: 13px; margin-bottom: 6px; color: #54595d; border: none; }
  .backlinks a { margin-right: 12px; }

  /* Home page */
  .home-welcome {
    background: #f8f9fa; border: 1px solid #a2a9b1; padding: 16px 20px; margin-bottom: 20px;
  }
  .home-welcome h2 { border: none; margin: 0 0 8px; font-size: 20px; }
  .home-welcome p { margin-bottom: 6px; font-size: 14px; }
  .home-welcome .home-stats { font-size: 13px; color: #54595d; margin-top: 8px; }

  .category-section { margin-bottom: 20px; }
  .category-section h2 {
    background: #dde8f0; padding: 6px 12px; margin: 0 0 1px;
    font-size: 15px; font-weight: 600; border: 1px solid #a2a9b1; border-bottom: none;
    font-family: -apple-system, sans-serif;
  }
  .category-list {
    border: 1px solid #a2a9b1; padding: 10px 14px; background: #fff;
  }
  .category-list ul { list-style: none; padding: 0; margin: 0; }
  .category-list li {
    display: inline; font-size: 13px;
  }
  .category-list li:after { content: " · "; color: #a2a9b1; }
  .category-list li:last-child:after { content: ""; }
  .category-list .item-type { color: #72777d; font-size: 12px; }

  .home-columns { display: flex; gap: 20px; }
  .home-col { flex: 1; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .search-bar input { width: 160px; }
    .home-columns { flex-direction: column; }
  }
</style>
</head>
<body>

<header class="site-header">
  <a class="site-logo" onclick="showHome()">Founder<span>Wiki</span></a>
  <span class="site-tagline">The compiled startup knowledge base</span>
  <div class="search-bar">
    <input type="text" id="search" placeholder="Search founder wiki..." oninput="onSearch(this.value)" onfocus="onSearch(this.value)">
    <div class="search-results" id="searchResults"></div>
  </div>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="content" id="content"></main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const ARTICLES = {};
const ARTICLE_LIST = [];

// Wikilink handling — supports [[Name]] and [[Slug|Display Name]]
function processWikilinks(html) {
  return html.replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g, (m, target, display) => {
    const slug = target.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    return `<a href="#" onclick="navigateTo('${slug}'); return false;">${display}</a>`;
  }).replace(/\[\[([^\]]+)\]\]/g, (m, name) => {
    const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    return `<a href="#" onclick="navigateTo('${slug}'); return false;">${name}</a>`;
  });
}

// Compute backlinks for an article
function getBacklinks(slug) {
  const links = [];
  ARTICLE_LIST.forEach(a => {
    if (a.slug === slug) return;
    // Check if this article's body contains a wikilink to our article
    const titlePattern = ARTICLES[slug]?.title;
    if (!titlePattern) return;
    const body = a.body || '';
    if (body.includes(`[[${titlePattern}]]`) || body.includes(`[[${titlePattern}|`)) {
      links.push(a);
    }
  });
  return links;
}

async function loadArticles() {
  try {
    const resp = await fetch('articles.json');
    const data = await resp.json();
    data.forEach(a => { ARTICLES[a.slug] = a; ARTICLE_LIST.push(a); });
  } catch(e) { console.error('Failed to load articles.json', e); }
  buildSidebar();
  showHome();
}

function buildSidebar() {
  const sidebar = document.getElementById('sidebar');

  // Group by stage-based categories
  const categories = {
    'Getting Started': ['startup-ideas', 'cofounders', 'founder-mindset'],
    'Building': ['early-stage-tactics', 'product-development', 'growth'],
    'Money': ['fundraising', 'financial-survival', 'board-governance'],
    'People': ['hiring', 'management', 'sales-and-distribution'],
    'Frameworks': [],
  };

  // Add frameworks
  ARTICLE_LIST.filter(a => a.dir === 'frameworks').forEach(a => categories['Frameworks'].push(a.slug));

  let html = '<span class="nav-label">Navigation</span>';
  html += `<a href="#" onclick="showHome(); return false;">Main page</a>`;

  for (const [cat, slugs] of Object.entries(categories)) {
    html += `<h3>${cat}</h3>`;
    const arts = slugs.map(s => ARTICLES[s]).filter(Boolean);
    // Also add any uncategorized topics
    if (cat === 'Frameworks') {
      // Already have them
    }
    arts.sort((a,b) => (a.title||'').localeCompare(b.title||''));
    arts.forEach(a => {
      html += `<a href="#" onclick="navigateTo('${a.slug}'); return false;">${a.title}</a>`;
    });
  }
  sidebar.innerHTML = html;
}

function showHome() {
  const content = document.getElementById('content');
  const topics = ARTICLE_LIST.filter(a => a.dir === 'topics');
  const frameworks = ARTICLE_LIST.filter(a => a.dir === 'frameworks');

  // Stage-based categories for the home page
  const stageCategories = [
    { name: 'Idea & Getting Started', icon: '💡', slugs: ['startup-ideas', 'cofounders', 'founder-mindset'] },
    { name: 'Building & Pre-PMF', icon: '🔨', slugs: ['early-stage-tactics', 'product-development'] },
    { name: 'Growth & Distribution', icon: '📈', slugs: ['growth', 'sales-and-distribution'] },
    { name: 'Fundraising & Finance', icon: '💰', slugs: ['fundraising', 'financial-survival', 'board-governance'] },
    { name: 'People & Organization', icon: '👥', slugs: ['hiring', 'management'] },
    { name: 'Frameworks & Mental Models', icon: '🧠', slugs: ['do-things-that-don-t-scale', 'default-alive-or-dead'] },
  ];

  let html = `
    <h1>Founder Wiki</h1>
    <div class="home-welcome">
      <h2>Welcome to Founder Wiki</h2>
      <p>A compiled knowledge base of startup and founder wisdom, built from Y Combinator's library of essays, lectures, and founder stories using the <a href="https://x.com/karpathy/status/2039805659525644595" target="_blank">LLM Knowledge Base pattern</a>.</p>
      <p>Articles synthesize advice from multiple sources into concept-centric pages with citations and cross-references. Every claim links back to its source.</p>
      <div class="home-stats">${ARTICLE_LIST.length} articles across ${stageCategories.length} categories · ${topics.length} topics · ${frameworks.length} frameworks · Source: YC Library</div>
    </div>

    <h2 style="border:none; margin-bottom:12px;">Browse by category</h2>
  `;

  // Two-column layout
  html += '<div class="home-columns">';
  html += '<div class="home-col">';

  stageCategories.forEach((cat, i) => {
    if (i === 3) { html += '</div><div class="home-col">'; } // Switch to right column
    html += `<div class="category-section">`;
    html += `<h2>${cat.name}</h2>`;
    html += `<div class="category-list"><ul>`;
    cat.slugs.forEach(slug => {
      const a = ARTICLES[slug];
      if (!a) return;
      const typeLabel = a.type === 'framework' ? 'framework' : '';
      html += `<li><a href="#" onclick="navigateTo('${slug}'); return false;">${a.title}</a>`;
      if (typeLabel) html += ` <span class="item-type">— ${typeLabel}</span>`;
      html += `</li>`;
    });
    html += `</ul></div></div>`;
  });

  html += '</div></div>';

  content.innerHTML = html;
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
}

function navigateTo(slug) {
  const article = ARTICLES[slug];
  if (!article) { console.warn('Article not found:', slug); return; }

  // Article meta line
  let metaLine = '<div class="article-meta-line">';
  if (article.type) metaLine += `<span class="meta-type">${article.type}</span>`;
  if (article.speakers_referenced) {
    const speakers = Array.isArray(article.speakers_referenced) ? article.speakers_referenced : [article.speakers_referenced];
    metaLine += `Contributors: ${speakers.join(', ')}`;
  }
  if (article.originated_by) metaLine += `Originated by: ${article.originated_by}`;
  metaLine += '</div>';

  // Build TOC from h2 headers — Wikipedia style
  const h2s = article.body.match(/^## .+$/gm) || [];
  let toc = '';
  if (h2s.length > 1) {
    toc = '<div class="toc-box"><div class="toc-title">Contents</div><ol>';
    h2s.forEach((h, i) => {
      const text = h.replace('## ', '');
      const id = text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
      toc += `<li><a href="#${id}">${text}</a></li>`;
    });
    toc += '</ol></div>';
  }

  // Render markdown
  let rendered = marked.parse(article.body);
  rendered = processWikilinks(rendered);

  // Add IDs to h2 for TOC linking
  rendered = rendered.replace(/<h2>(.*?)<\/h2>/g, (m, text) => {
    const cleanText = text.replace(/<[^>]+>/g, '');
    const id = cleanText.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    return `<h2 id="${id}">${text}</h2>`;
  });

  // Backlinks
  const backlinks = getBacklinks(slug);
  let blHtml = '';
  if (backlinks.length) {
    blHtml = '<div class="backlinks"><h3>Pages that link here</h3>';
    backlinks.forEach(b => {
      blHtml += `<a href="#" onclick="navigateTo('${b.slug}'); return false;">${b.title}</a>`;
    });
    blHtml += '</div>';
  }

  document.getElementById('content').innerHTML = metaLine + toc + rendered + blHtml;

  // Highlight active sidebar item
  document.querySelectorAll('.sidebar a').forEach(a => {
    a.classList.toggle('active', a.textContent === article.title);
  });

  document.getElementById('searchResults').classList.remove('active');
  document.getElementById('search').value = '';
  window.scrollTo(0, 0);
}

function onSearch(query) {
  const results = document.getElementById('searchResults');
  if (!query || query.length < 2) { results.classList.remove('active'); return; }

  const q = query.toLowerCase();
  const matches = ARTICLE_LIST.filter(a => {
    if ((a.title || '').toLowerCase().includes(q)) return true;
    const aliases = Array.isArray(a.aliases) ? a.aliases : [];
    if (aliases.some(al => al.toLowerCase().includes(q))) return true;
    // Also search body text
    if ((a.body || '').toLowerCase().includes(q)) return true;
    return false;
  });

  if (!matches.length) { results.classList.remove('active'); return; }

  results.innerHTML = matches.slice(0, 8).map(a => {
    const aliases = Array.isArray(a.aliases) ? a.aliases.slice(0, 4).join(', ') : '';
    return `<div class="search-result-item" onclick="navigateTo('${a.slug}')">
      <div class="sr-title">${a.title}</div>
      <div class="sr-aliases">${aliases}</div>
    </div>`;
  }).join('');
  results.classList.add('active');
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-bar')) {
    document.getElementById('searchResults').classList.remove('active');
  }
});

loadArticles();
</script>
</body>
</html>
